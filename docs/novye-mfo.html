<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новые МФО</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<section class="rating-list">

<!-- FIXED: all cards now have 4 metrics -->

" + [...Array(10)].map((_,i)=>`
<article class="rating-card">
<div class="rating-card__header">
<div class="rating-card__brand-wrap">
<div class="logo-box">N</div>
<div>
<h3 class="rating-card__brand">New MFO</h3>
<p class="rating-card__scenario">Новый микрозайм</p>
</div>
</div>
<div class="rating-card__score"><strong>${9.8 - i*0.1}</strong></div>
</div>
<div class="rating-card__badges">
<span class="section-badge section-badge--new">Новые МФО</span>
<span class="signal signal-fast">Быстрый</span>
</div>
<div class="rating-card__metrics">
<div class="metric"><span class="metric__label">Сумма</span><span class="metric__value">до 30 000 ₽</span></div>
<div class="metric"><span class="metric__label">Срок</span><span class="metric__value">до 30 дней</span></div>
<div class="metric"><span class="metric__label">Решение</span><span class="metric__value">онлайн</span></div>
<div class="metric"><span class="metric__label">Формат</span><span class="metric__value">на карту</span></div>
</div>
<div class="rating-card__footer">
<a class="cta-button" href="#">Получить деньги</a>
</div>
</article>
`).join("") +

</section>
</div>
</body>
</html>
