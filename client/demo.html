<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM Client - HitFeedback Demo</title>
    <link rel="stylesheet" href="src/styles/effects.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
        }
        
        .game-area {
            position: relative;
            width: 100%;
            height: 400px;
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .player {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .player-1 {
            background: #4CAF50;
            top: 50px;
            left: 100px;
        }
        
        .player-2 {
            background: #F44336;
            top: 50px;
            right: 100px;
        }
        
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
        
        .balance {
            margin: 5px 0;
            font-size: 18px;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background: #1976D2;
        }
        
        .log {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="game-area">
        <div class="hud">
            <div class="balance" id="balance-player-1">Player1: 1000</div>
            <div class="balance" id="balance-player-2">Player2: 1000</div>
        </div>
        
        <div class="player player-1" id="player-player-1">P1</div>
        <div class="player player-2" id="player-player-2">P2</div>
    </div>
    
    <div class="controls">
        <button onclick="simulateHit('player-1', 'player-2', 'head', 0.8)">Удар в голову (0.8)</button>
        <button onclick="simulateHit('player-2', 'player-1', 'body', 0.6)">Удар в тело (0.6)</button>
        <button onclick="simulateHit('player-1', 'player-2', 'limb', 1.0)">Удар в конечность (1.0)</button>
        <button onclick="resetBalances()">Сброс балансов</button>
    </div>
    
    <div class="log" id="log"></div>

    <script type="module">
        // Импортируем функции из модулей
        import { onHitFeedback } from './src/ui/hitFeedback.js';
        import { registerHUD } from './src/ui/hud.js';
        
        // Регистрируем HUD элементы
        registerHUD('player-1', document.getElementById('balance-player-1'));
        registerHUD('player-2', document.getElementById('balance-player-2'));
        
        // Глобальные переменные для демо
        let balances = {
            'player-1': 1000,
            'player-2': 1000
        };
        
        // Функция для симуляции удара
        window.simulateHit = function(attackerId, targetId, zone, power) {
            const f = 0.20;
            const zoneMultiplier = {
                head: 1.5,
                body: 1.0,
                limb: 0.5
            };
            
            const attackerBalance = balances[attackerId];
            const delta = Math.round(attackerBalance * f * zoneMultiplier[zone] * power);
            
            if (delta <= 0) {
                log(`❌ Удар не удался: слишком маленький урон`);
                return;
            }
            
            // Обновляем балансы
            balances[attackerId] = Math.max(0, balances[attackerId] + delta);
            balances[targetId] = Math.max(0, balances[targetId] - delta);
            
            // Создаем событие hit_feedback
            const hitEvent = {
                type: "hit_feedback",
                attackerId: attackerId,
                targetId: targetId,
                zone: zone,
                delta: delta,
                balanceAttacker: balances[attackerId],
                balanceTarget: balances[targetId],
                ts: Date.now()
            };
            
            log(`🥊 ${attackerId} -> ${targetId} (${zone}, power=${power}) delta=${delta}`);
            
            // Вызываем обработчик
            onHitFeedback(hitEvent);
        };
        
        // Функция сброса балансов
        window.resetBalances = function() {
            balances = {
                'player-1': 1000,
                'player-2': 1000
            };
            
            document.getElementById('balance-player-1').textContent = 'Player1: 1000';
            document.getElementById('balance-player-2').textContent = 'Player2: 1000';
            
            log('🔄 Балансы сброшены');
        };
        
        // Функция логирования
        function log(message) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div>[${time}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        log('🎮 Демо HitFeedback системы запущено');
        log('💡 Нажмите кнопки для симуляции ударов');
    </script>
</body>
</html>
